<script>
const SYS = `Tu Aanya Nirvaah ka AI Social Media Manager hai. Aanya ek Indian virtual AI influencer hai — cute, warm, unapologetically desi North Indian girl (Delhi/Punjab vibe). Uski personality soft aur relatable hai. Tera kaam hai uske Instagram account ko grow karna.

Character: Aanya Nirvaah | North India (Delhi/Punjab) | Desi lifestyle, fashion, self-love | Tools: Flow AI, Veo 3, Face Swap | Status: New account growing

Response style: Practical, actionable, Hinglish (Hindi+English mix), concise aur clear.`;

function getKey() { return localStorage.getItem('aanya_gemini_key') || ''; }

function saveKey() {
  const k = document.getElementById('modal-key').value.trim();
  if (k.length < 10) { document.getElementById('key-err').style.display = 'block'; return; }
  localStorage.setItem('aanya_gemini_key', k);
  document.getElementById('api-modal').style.display = 'none';
  document.getElementById('key-err').style.display = 'none';
  updateDot();
}

function showModal() {
  const k = getKey();
  if (k) document.getElementById('modal-key').value = k;
  document.getElementById('api-modal').style.display = 'flex';
}

function updateDot() {
  const d = document.getElementById('status-dot');
  if (getKey()) {
    d.style.cssText = 'width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 8px #10b981;animation:pulse 2s infinite;';
  } else {
    d.style.cssText = 'width:8px;height:8px;border-radius:50%;background:#f43f5e;box-shadow:0 0 8px #f43f5e;';
  }
}

const style = document.createElement('style');
style.textContent = '@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}';
document.head.appendChild(style);

window.addEventListener('load', () => {
  updateDot();
  if (!getKey()) document.getElementById('api-modal').style.display = 'flex';
});

async function ai(prompt) {
  const key = getKey();
  if (!key) { showModal(); throw new Error('API Key missing'); }
  const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: SYS + '\n\n' + prompt }] }],
      generationConfig: { maxOutputTokens: 1200, temperature: 0.85 }
    })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text || 'Kuch error aaya API response mein.';
}

function goTab(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

function load(id, on) { document.getElementById('l-' + id).classList.toggle('on', on); }

function showResp(id, text) {
  const el = document.getElementById('r-' + id);
  el.textContent = text;
  el.classList.add('on');
  const cp = document.getElementById('cp-' + id);
  if (cp) cp.classList.add('on');
}

async function analyzeAcc() {
  const f = document.getElementById('i-followers').value;
  const p = document.getElementById('i-posts').value;
  if (!f || !p) { alert('Followers aur posts zaroor bharo!'); return; }
  document.getElementById('v-followers').textContent = f;
  document.getElementById('v-posts').textContent = p;
  document.getElementById('v-likes').textContent = document.getElementById('i-likes').value || '—';
  document.getElementById('v-views').textContent = document.getElementById('i-views').value || '—';
  load('analyze', true);
  document.getElementById('btn-analyze').disabled = true;
  try {
    const res = await ai(`Aanya Nirvaah ke account ka analysis karo:\n- Followers: ${f}\n- Posts: ${p}\n- Avg Likes: ${document.getElementById('i-likes').value||'N/A'}\n- Avg Views: ${document.getElementById('i-views').value||'N/A'}\n- Content: ${document.getElementById('i-content').value}\n- Frequency: ${document.getElementById('i-freq').value}\n- Challenge: ${document.getElementById('i-challenge').value||'None'}\n\nDe: 1) Account health score/10, 2) Kya achha hai, 3) Kya improve karo, 4) Top 3 priority actions`);
    showResp('analyze', res);
  } catch(e) { showResp('analyze', '❌ Error: ' + e.message); }
  load('analyze', false);
  document.getElementById('btn-analyze').disabled = false;
}

async function genStrategy() {
  load('strategy', true);
  try {
    const res = await ai(`Aanya ke liye 30-day Instagram growth strategy:\n- Goal: ${document.getElementById('i-goal').value}\n- Time: ${document.getElementById('i-time').value}\n- Tools: ${document.getElementById('i-tools').value}\n\nInclude: Week 1-2 plan, Week 3-4 plan, daily routine, metrics to track, brand deal timeline`);
    showResp('strategy', res);
  } catch(e) { showResp('strategy', '❌ Error: ' + e.message); }
  load('strategy', false);
}

async function genCaption() {
  const t = document.getElementById('i-topic').value;
  if (!t) { alert('Topic batao!'); return; }
  load('caption', true);
  try {
    const res = await ai(`Aanya ke liye Instagram caption:\n- Topic: ${t}\n- Mood: ${document.getElementById('i-mood').value}\n- Language: ${document.getElementById('i-lang').value}\n\nFormat:\nCAPTION:\n[2-3 lines, cute desi personality, 1-2 emojis, CTA at end]\n\nHASHTAGS:\n[8-10 relevant hashtags]`);
    showResp('caption', res);
  } catch(e) { showResp('caption', '❌ Error: ' + e.message); }
  load('caption', false);
}

async function genHashtags() {
  const t = document.getElementById('i-topic').value || 'desi lifestyle virtual influencer';
  load('hashtags', true);
  try {
    const res = await ai(`Aanya ke liye custom Instagram hashtags:\n- Niche: Desi virtual influencer, North Indian girl\n- Topic: ${t}\n\n3 groups mein do:\n1. 🔥 High reach (5 tags — 1M+ posts)\n2. 🎯 Medium reach (8 tags — 100K-1M)\n3. 💎 Niche specific (7 tags — under 100K)\n\nCopy-paste ready format.`);
    showResp('hashtags', res);
  } catch(e) { showResp('hashtags', '❌ Error: ' + e.message); }
  load('hashtags', false);
}

async function genIdeas() {
  load('ideas', true);
  try {
    const res = await ai(`Aanya ke liye ${document.getElementById('i-count').value} Instagram Reel ideas:\n- Topic: ${document.getElementById('i-trend').value || 'general desi lifestyle'}\n- Style: ${document.getElementById('i-style').value}\n\nHar idea mein: 1) Concept, 2) Audio type, 3) Hook (first 2 sec), 4) Caption idea. Flow AI/Veo 3 se doable hona chahiye.`);
    showResp('ideas', res);
  } catch(e) { showResp('ideas', '❌ Error: ' + e.message); }
  load('ideas', false);
}

async function genPrompt() {
  const concept = document.getElementById('i-concept').value;
  if (!concept) { alert('Scene/concept batao!'); return; }
  load('prompt', true);
  try {
    const res = await ai(`Aanya Nirvaah ke liye ek ultra-detailed AI image generation prompt banao.

Character description: Beautiful Indian girl, early 20s, natural look, small bindi on forehead, oxidized silver earrings, warm brown eyes, long black wavy hair, soft features, North Indian girl.

Scene details:
- Concept: ${concept}
- Mood/Aesthetic: ${document.getElementById('i-paesthetic').value}
- Outfit: ${document.getElementById('i-outfit').value}
- Location: ${document.getElementById('i-location').value}
- Style: ${document.getElementById('i-tool').value}
- Extra: ${document.getElementById('i-extra').value || 'none'}

Ek single, long, comma-separated prompt banao (around 250 characters max) jo:
1. Character ko perfectly describe kare
2. Scene, lighting, atmosphere detail mein ho
3. Technical photography/art terms use kare
4. Negative prompts bhi do alag se

Format:
PROMPT:
[detailed prompt]

NEGATIVE PROMPT:
[negative prompt]`);
    showResp('prompt', res);
  } catch(e) { showResp('prompt', '❌ Error: ' + e.message); }
  load('prompt', false);
}

async function genCalendar() {
  load('calendar', true);
  try {
    const res = await ai(`Aanya ke liye ek hafte ka Instagram content calendar:\n- Posts/week: ${document.getElementById('i-ppw').value}\n- Theme: ${document.getElementById('i-theme').value || 'General desi lifestyle'}\n- Tools: Flow AI + Veo 3 + Face Swap\n\nTable format mein: Din | Post Type | Content Idea | Best Time | Caption Hook\nIndian events/festivals bhi include karo agar relevant ho.`);
    showResp('calendar', res);
  } catch(e) { showResp('calendar', '❌ Error: ' + e.message); }
  load('calendar', false);
}

function copyEl(id, btnId) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    const orig = btn.textContent;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function cpTag(el) {
  navigator.clipboard.writeText(el.textContent).then(() => {
    const orig = el.textContent;
    el.textContent = '✅';
    setTimeout(() => el.textContent = orig, 1500);
  });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
